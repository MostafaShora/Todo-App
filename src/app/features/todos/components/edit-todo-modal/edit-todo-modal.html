<div
  class="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center z-50"
  (click)="onClose()"
>
  <div
    class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-6 animate-scale"
    (click)="$event.stopPropagation()"
  >
    <!-- Task Editor -->

    <div class="flex items-center justify-between mb-6">
      <h2 class="text-xl font-bold text-slate-800">Edit Task</h2>

      <button class="text-slate-400 hover:text-red-500 transition" (click)="onClose()">
        <i class="fa-solid fa-xmark text-lg"></i>
      </button>
    </div>

    <label class="block text-sm font-medium text-slate-600 mb-2"> Task Name </label>

    <input
      #titleInput
      type="text"
      class="w-full border-2 border-slate-200 rounded-lg px-4 py-3 focus:border-sky-500 outline-none transition"
      [ngModel]="title()"
      (ngModelChange)="title.set($event)"
      (keyup.enter)="onSave()"
    />

    <!-- Priority -->

    <div class="mt-5">
      <label class="block text-sm font-medium text-slate-600 mb-2"> Priority </label>

      <div class="relative">
        <button
          type="button"
          class="priority-btn"
          (click)="$event.stopPropagation(); togglePriority()"
          [class.open]="isPriorityOpen()"
        >
          <div class="flex items-center gap-2">
            @switch (priority()) {
              @case ('Low') {
                <i class="fa-solid fa-circle text-green-500 text-xs"></i>
              }

              @case ('Medium') {
                <i class="fa-solid fa-circle text-yellow-400 text-xs"></i>
              }

              @case ('High') {
                <i class="fa-solid fa-circle text-red-500 text-xs"></i>
              }
            }

            <span>{{ priority() }}</span>
          </div>

          <i class="fa-solid fa-chevron-down"></i>
        </button>

        @if (isPriorityOpen()) {
          <div class="priority-menu">
            <button type="button" class="priority-item" (click)="selectPriority('Low')">
              <div class="flex items-center gap-2">
                <i class="fa-solid fa-circle text-green-500 text-xs"></i>
                Low
              </div>

              @if (priority() === 'Low') {
                <i class="fa-solid fa-check text-green-500"></i>
              }
            </button>

            <button class="priority-item" (click)="selectPriority('Medium')">
              <div class="flex items-center gap-2">
                <i class="fa-solid fa-circle text-yellow-400 text-xs"></i>
                Medium
              </div>

              @if (priority() === 'Medium') {
                <i class="fa-solid fa-check text-yellow-500"></i>
              }
            </button>

            <button class="priority-item" (click)="selectPriority('High')">
              <div class="flex items-center gap-2">
                <i class="fa-solid fa-circle text-red-500 text-xs"></i>
                High
              </div>

              @if (priority() === 'High') {
                <i class="fa-solid fa-check text-red-500"></i>
              }
            </button>
          </div>
        }
      </div>
    </div>

    <!-- Category -->

    <div class="mt-5">
      <label class="block text-sm font-medium text-slate-600 mb-2"> Category </label>

      <div class="relative">
        <button
          type="button"
          class="priority-btn"
          (click)="$event.stopPropagation(); toggleCategory()"
          [class.open]="isCategoryOpen()"
        >
          <div class="flex items-center gap-2">
            @switch (category()) {
              @case ('Work') {
                <i class="fa-solid fa-briefcase text-sky-500"></i>
              }

              @case ('Personal') {
                <i class="fa-solid fa-user text-pink-500"></i>
              }

              @case ('Study') {
                <i class="fa-solid fa-book text-indigo-500"></i>
              }

              @case ('Shopping') {
                <i class="fa-solid fa-cart-shopping text-orange-500"></i>
              }

              @case ('Health') {
                <i class="fa-solid fa-heart-pulse text-red-500"></i>
              }
            }

            <span>{{ category() }}</span>
          </div>

          <i class="fa-solid fa-chevron-down"></i>
        </button>

        @if (isCategoryOpen()) {
          <div class="priority-menu">
            <button class="priority-item" (click)="selectCategory('Work')">
              <div class="flex items-center gap-2">
                <i class="fa-solid fa-briefcase text-sky-500"></i>
                Work
              </div>

              @if (category() === 'Work') {
                <i class="fa-solid fa-check text-sky-500"></i>
              }
            </button>

            <button class="priority-item" (click)="selectCategory('Personal')">
              <div class="flex items-center gap-2">
                <i class="fa-solid fa-user text-pink-500"></i>
                Personal
              </div>

              @if (category() === 'Personal') {
                <i class="fa-solid fa-check text-pink-500"></i>
              }
            </button>

            <button class="priority-item" (click)="selectCategory('Study')">
              <div class="flex items-center gap-2">
                <i class="fa-solid fa-book text-indigo-500"></i>
                Study
              </div>

              @if (category() === 'Study') {
                <i class="fa-solid fa-check text-indigo-500"></i>
              }
            </button>

            <button class="priority-item" (click)="selectCategory('Shopping')">
              <div class="flex items-center gap-2">
                <i class="fa-solid fa-cart-shopping text-orange-500"></i>
                Shopping
              </div>

              @if (category() === 'Shopping') {
                <i class="fa-solid fa-check text-orange-500"></i>
              }
            </button>

            <button class="priority-item" (click)="selectCategory('Health')">
              <div class="flex items-center gap-2">
                <i class="fa-solid fa-heart-pulse text-red-500"></i>
                Health
              </div>

              @if (category() === 'Health') {
                <i class="fa-solid fa-check text-red-500"></i>
              }
            </button>
          </div>
        }
      </div>
    </div>

    <!-- Due Date -->

    <div class="mt-5">
      <label class="block text-sm font-medium text-slate-600 mb-2"> Due Date </label>

      <input
        type="date"
        class="w-full border-2 border-slate-200 rounded-lg px-4 py-3 focus:border-sky-500 outline-none transition"
        [ngModel]="dueDate()"
        (ngModelChange)="dueDate.set($event)"
      />
    </div>

    <div class="flex justify-end gap-3 mt-6">
      <button
        class="px-5 py-2 rounded-lg border border-slate-300 hover:bg-slate-100 transition"
        (click)="onClose()"
      >
        Cancel
      </button>

      <button
        class="px-5 py-2 rounded-lg bg-sky-500 hover:bg-sky-600 text-white transition"
        (click)="onSave()"
      >
        Save
      </button>
    </div>
  </div>
</div>
