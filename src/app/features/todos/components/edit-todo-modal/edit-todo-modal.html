<div
  class="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center z-50"
  (click)="onClose()"
>
  <div
    class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-2xl shadow-2xl w-full max-w-md p-6 animate-scale"
    (click)="$event.stopPropagation()"
  >
    <!-- Task Editor -->

    <div class="flex items-center justify-between mb-6">
      <h2 class="text-xl font-bold text-slate-800 dark:text-slate-100">{{ 'edit.title' | transloco }}</h2>

      <button
        class="text-slate-400 dark:text-slate-500 hover:text-red-500 dark:hover:text-red-400 transition"
        (click)="onClose()"
      >
        <i class="fa-solid fa-xmark text-lg"></i>
      </button>
    </div>

    <label class="block text-sm font-medium text-slate-600 dark:text-slate-400 mb-2">
      {{ 'edit.taskName' | transloco }}
    </label>

    <input
      #titleInput
      type="text"
      class="w-full rounded-lg border-2 border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 px-4 py-3 text-slate-800 dark:text-slate-100 outline-none transition focus:border-sky-500 focus:ring-4 focus:ring-sky-500/10"
      [ngModel]="title()"
      (ngModelChange)="title.set($event)"
      (keyup.enter)="onSave()"
    />

    <!-- Priority -->

    <div class="mt-5">
      <label class="block text-sm font-medium text-slate-600 dark:text-slate-400 mb-2">
        {{ 'form.priority' | transloco }}
      </label>

      <div class="relative">
        <button
          type="button"
          class="w-full h-14 px-4 appearance-none rounded-lg border-2 border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 text-slate-800 dark:text-slate-100 flex items-center justify-between cursor-pointer transition-all duration-200 hover:border-sky-500 focus:outline-none focus:border-sky-500 focus:ring-4 focus:ring-sky-500/10"
          (click)="$event.stopPropagation(); togglePriority()"
          [class.open]="isPriorityOpen()"
        >
          <div class="flex items-center gap-2">
            @switch (priority()) {
              @case ('Low') {
                <i class="fa-solid fa-circle text-green-500 text-xs"></i>
              }

              @case ('Medium') {
                <i class="fa-solid fa-circle text-yellow-400 text-xs"></i>
              }

              @case ('High') {
                <i class="fa-solid fa-circle text-red-500 text-xs"></i>
              }
            }

            <span>{{ ('todo.' + priority().toLowerCase()) | transloco }}</span>
          </div>

          <i
            class="fa-solid fa-chevron-down transition-transform duration-200"
            [class.rotate-180]="isPriorityOpen()"
          ></i>
        </button>

        @if (isPriorityOpen()) {
          <div
            class="absolute top-full left-0 mt-2 w-full overflow-hidden rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 shadow-2xl z-50 animate-scale"
          >
            <button
              type="button"
              class="w-full h-12 px-4 flex items-center justify-between text-slate-700 dark:text-slate-100 cursor-pointer transition-all duration-200 hover:bg-slate-50 dark:hover:bg-slate-800 hover:pl-6"
              (click)="selectPriority('Low')"
            >
              <div class="flex items-center gap-2">
                <i class="fa-solid fa-circle text-green-500 text-xs"></i>
                {{ 'todo.low' | transloco }}
              </div>

              @if (priority() === 'Low') {
                <i class="fa-solid fa-check text-green-500"></i>
              }
            </button>

            <button
              class="w-full h-12 px-4 flex items-center justify-between text-slate-700 dark:text-slate-100 cursor-pointer transition-all duration-200 hover:bg-slate-50 dark:hover:bg-slate-800 hover:pl-6"
              (click)="selectPriority('Medium')"
            >
              <div class="flex items-center gap-2">
                <i class="fa-solid fa-circle text-yellow-400 text-xs"></i>
                {{ 'todo.medium' | transloco }}
              </div>

              @if (priority() === 'Medium') {
                <i class="fa-solid fa-check text-yellow-500"></i>
              }
            </button>

            <button
              class="w-full h-12 px-4 flex items-center justify-between text-slate-700 dark:text-slate-100 cursor-pointer transition-all duration-200 hover:bg-slate-50 dark:hover:bg-slate-800 hover:pl-6"
              (click)="selectPriority('High')"
            >
              <div class="flex items-center gap-2">
                <i class="fa-solid fa-circle text-red-500 text-xs"></i>
                {{ 'todo.high' | transloco }}
              </div>

              @if (priority() === 'High') {
                <i class="fa-solid fa-check text-red-500"></i>
              }
            </button>
          </div>
        }
      </div>
    </div>

    <!-- Category -->

    <div class="mt-5">
      <label class="block text-sm font-medium text-slate-600 dark:text-slate-400 mb-2">
        {{ 'form.category' | transloco }}
      </label>

      <div class="relative">
        <button
          type="button"
          class="w-full h-14 px-4 appearance-none rounded-lg border-2 border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 text-slate-800 dark:text-slate-100 flex items-center justify-between cursor-pointer transition-all duration-200 hover:border-sky-500 focus:outline-none focus:border-sky-500 focus:ring-4 focus:ring-sky-500/10"
          (click)="$event.stopPropagation(); toggleCategory()"
          [class.open]="isCategoryOpen()"
        >
          <div class="flex items-center gap-2">
            @switch (category()) {
              @case ('Work') {
                <i class="fa-solid fa-briefcase text-sky-500"></i>
              }

              @case ('Personal') {
                <i class="fa-solid fa-user text-pink-500"></i>
              }

              @case ('Study') {
                <i class="fa-solid fa-book text-indigo-500"></i>
              }

              @case ('Shopping') {
                <i class="fa-solid fa-cart-shopping text-orange-500"></i>
              }

              @case ('Health') {
                <i class="fa-solid fa-heart-pulse text-red-500"></i>
              }
            }

            <span>{{ ('todo.' + category().toLowerCase()) | transloco }}</span>
          </div>

          <i
            class="fa-solid fa-chevron-down transition-transform duration-200"
            [class.rotate-180]="isCategoryOpen()"
          ></i>
        </button>

        @if (isCategoryOpen()) {
          <div
            class="absolute top-full left-0 mt-2 w-full overflow-hidden rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 shadow-2xl z-50 animate-scale"
          >
            <button
              class="w-full h-12 px-4 flex items-center justify-between text-slate-700 dark:text-slate-100 cursor-pointer transition-all duration-200 hover:bg-slate-50 dark:hover:bg-slate-800 hover:pl-6"
              (click)="selectCategory('Work')"
            >
              <div class="flex items-center gap-2">
                <i class="fa-solid fa-briefcase text-sky-500"></i>
                {{ 'todo.work' | transloco }}
              </div>

              @if (category() === 'Work') {
                <i class="fa-solid fa-check text-sky-500"></i>
              }
            </button>

            <button
              class="w-full h-12 px-4 flex items-center justify-between text-slate-700 dark:text-slate-100 cursor-pointer transition-all duration-200 hover:bg-slate-50 dark:hover:bg-slate-800 hover:pl-6"
              (click)="selectCategory('Personal')"
            >
              <div class="flex items-center gap-2">
                <i class="fa-solid fa-user text-pink-500"></i>
                {{ 'todo.personal' | transloco }}
              </div>

              @if (category() === 'Personal') {
                <i class="fa-solid fa-check text-pink-500"></i>
              }
            </button>

            <button
              class="w-full h-12 px-4 flex items-center justify-between text-slate-700 dark:text-slate-100 cursor-pointer transition-all duration-200 hover:bg-slate-50 dark:hover:bg-slate-800 hover:pl-6"
              (click)="selectCategory('Study')"
            >
              <div class="flex items-center gap-2">
                <i class="fa-solid fa-book text-indigo-500"></i>
                {{ 'todo.study' | transloco }}
              </div>

              @if (category() === 'Study') {
                <i class="fa-solid fa-check text-indigo-500"></i>
              }
            </button>

            <button
              class="w-full h-12 px-4 flex items-center justify-between text-slate-700 dark:text-slate-100 cursor-pointer transition-all duration-200 hover:bg-slate-50 dark:hover:bg-slate-800 hover:pl-6"
              (click)="selectCategory('Shopping')"
            >
              <div class="flex items-center gap-2">
                <i class="fa-solid fa-cart-shopping text-orange-500"></i>
                {{ 'todo.shopping' | transloco }}
              </div>

              @if (category() === 'Shopping') {
                <i class="fa-solid fa-check text-orange-500"></i>
              }
            </button>

            <button
              class="w-full h-12 px-4 flex items-center justify-between text-slate-700 dark:text-slate-100 cursor-pointer transition-all duration-200 hover:bg-slate-50 dark:hover:bg-slate-800 hover:pl-6"
              (click)="selectCategory('Health')"
            >
              <div class="flex items-center gap-2">
                <i class="fa-solid fa-heart-pulse text-red-500"></i>
                {{ 'todo.health' | transloco }}
              </div>

              @if (category() === 'Health') {
                <i class="fa-solid fa-check text-red-500"></i>
              }
            </button>
          </div>
        }
      </div>
    </div>

    <!-- Due Date -->

    <div class="mt-5">
      <label class="block text-sm font-medium text-slate-600 dark:text-slate-400 mb-2">
        {{ 'form.dueDate' | transloco }}
      </label>

      <input
        type="date"
        class="w-full rounded-lg border-2 border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 px-4 py-3 text-slate-800 dark:text-slate-100 outline-none transition focus:border-sky-500 focus:ring-4 focus:ring-sky-500/10"
        [ngModel]="dueDate()"
        (ngModelChange)="dueDate.set($event)"
      />
    </div>

    <div class="flex justify-end gap-3 mt-6">
      <button
        class="px-5 py-2 rounded-lg border border-slate-300 dark:border-slate-600 text-slate-700 dark:text-slate-200 hover:bg-slate-100 dark:hover:bg-slate-800 transition"
        (click)="onClose()"
      >
        {{ 'todo.cancel' | transloco }}
      </button>

      <button
        class="px-5 py-2 rounded-lg bg-sky-500 hover:bg-sky-600 shadow-md shadow-sky-500/20 text-white transition"
        (click)="onSave()"
      >
        {{ 'todo.save' | transloco }}
      </button>
    </div>
  </div>
</div>
