<div
  class="flex items-center justify-between mb-10 animate-fade-in-down transition-colors duration-300"
>
  <div>
    <h1
      class="text-4xl font-bold mb-2 bg-gradient-to-r from-sky-500 to-sky-700 dark:from-sky-400 dark:to-cyan-300 bg-clip-text text-transparent"
    >
      <i class="fa-solid fa-check-double mr-2 text-sky-500 dark:text-sky-400"></i>
      {{ 'header.title' | transloco }}
    </h1>

    <p class="text-slate-500 dark:text-slate-400">
      {{ 'header.subtitle' | transloco }}
    </p>
  </div>

  <div class="flex items-center gap-3">
    <!-- Language -->
    <button
      (click)="language.toggleLanguage()"
      class="w-11 h-11 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 text-slate-600 dark:text-slate-200 hover:border-sky-500 hover:scale-105 active:scale-95 transition-all duration-200"
    >
      {{ language.currentLanguage === 'en' ? 'AR' : 'EN' }}
    </button>

    <!-- Theme -->
    <button
      (click)="theme.toggleTheme()"
      class="w-11 h-11 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 text-slate-600 dark:text-slate-200 hover:border-sky-500 hover:scale-105 active:scale-95 transition-all duration-200"
    >
      @if (theme.isDark()) {
        <i class="fa-solid fa-sun text-yellow-400"></i>
      } @else {
        <i class="fa-solid fa-moon text-sky-500"></i>
      }
    </button>
  </div>
</div>
