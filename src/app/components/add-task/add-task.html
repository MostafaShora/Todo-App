<div class="add-task-container">
  <div class="task-row">
    <input
      type="text"
      [(ngModel)]="taskTitle"
      placeholder="What needs to be done?"
      class="add-input"
    />

    <button class="btn-add w-full md:w-auto" (click)="addTask()">
      <i class="fa-solid fa-plus"></i>
      Add Task
    </button>
  </div>

  <!-- Priority + Due Date -->
  <div class="fields-grid">
    <div class="field relative">
      <!-- Priority -->
        <label class="field-label">Priority</label>

        <div class="relative">
          <button
            type="button"
            (click)="togglePriority(); $event.stopPropagation()"
            class="priority-btn w-full"
          >
            <div class="flex items-center gap-2">
              @switch (priority()) {
                @case ('Low') {
                  <i class="fa-solid fa-circle text-green-500 text-xs"></i>
                }

                @case ('Medium') {
                  <i class="fa-solid fa-circle text-yellow-400 text-xs"></i>
                }

                @case ('High') {
                  <i class="fa-solid fa-circle text-red-500 text-xs"></i>
                }
              }

              {{ priority() }}
            </div>

            <i class="fa-solid fa-chevron-down" [class.rotate-180]="isPriorityOpen()"></i>
          </button>

          @if (isPriorityOpen()) {
            <div class="priority-menu">
              <button (click)="selectPriority('Low')" class="priority-item">
                <div class="flex items-center gap-2">
                  <i class="fa-solid fa-circle text-green-500 text-xs"></i>
                  Low
                </div>

                @if (priority() === 'Low') {
                  <i class="fa-solid fa-check text-green-500"></i>
                }
              </button>

              <button (click)="selectPriority('Medium')" class="priority-item">
                <div class="flex items-center gap-2">
                  <i class="fa-solid fa-circle text-yellow-400 text-xs"></i>
                  Medium
                </div>

                @if (priority() === 'Medium') {
                  <i class="fa-solid fa-check text-yellow-500"></i>
                }
              </button>

              <button (click)="selectPriority('High')" class="priority-item">
                <div class="flex items-center gap-2">
                  <i class="fa-solid fa-circle text-red-500 text-xs"></i>
                  High
                </div>

                @if (priority() === 'High') {
                  <i class="fa-solid fa-check text-red-500"></i>
                }
              </button>
            </div>
          }
        </div>
    </div>

    <!-- Due Date -->

    <div class="field relative">
        <label class="field-label">Due Date</label>

        <input
          type="date"
          class="add-input w-full"
          [ngModel]="dueDate()"
          (ngModelChange)="dueDate.set($event)"
        />
      </div>

    <!-- Category -->
    <div class="field relative">
        <label class="field-label">Category</label>

        <button
          type="button"
          class="priority-btn w-full"
          (click)="toggleCategory(); $event.stopPropagation()"
        >
          <div class="flex items-center gap-2">
            @switch (category()) {
              @case ('Work') {
                <i class="fa-solid fa-briefcase text-sky-500"></i>
              }

              @case ('Personal') {
                <i class="fa-solid fa-user text-pink-500"></i>
              }

              @case ('Study') {
                <i class="fa-solid fa-book text-indigo-500"></i>
              }

              @case ('Shopping') {
                <i class="fa-solid fa-cart-shopping text-orange-500"></i>
              }

              @case ('Health') {
                <i class="fa-solid fa-heart-pulse text-red-500"></i>
              }
            }

            <span>{{ category() }}</span>
          </div>

          <i
            class="fa-solid fa-chevron-down transition-transform duration-200"
            [class.rotate-180]="isCategoryOpen()"
          ></i>
        </button>

        @if (isCategoryOpen()) {
          <div class="priority-menu">
            <button class="priority-item" (click)="selectCategory('Work')">
              <div class="flex items-center gap-2">
                <i class="fa-solid fa-briefcase text-sky-500"></i>
                Work
              </div>

              @if (category() === 'Work') {
                <i class="fa-solid fa-check text-sky-500"></i>
              }
            </button>

            <button class="priority-item" (click)="selectCategory('Personal')">
              <div class="flex items-center gap-2">
                <i class="fa-solid fa-user text-pink-500"></i>
                Personal
              </div>

              @if (category() === 'Personal') {
                <i class="fa-solid fa-check text-pink-500"></i>
              }
            </button>

            <button class="priority-item" (click)="selectCategory('Study')">
              <div class="flex items-center gap-2">
                <i class="fa-solid fa-book text-indigo-500"></i>
                Study
              </div>

              @if (category() === 'Study') {
                <i class="fa-solid fa-check text-indigo-500"></i>
              }
            </button>

            <button class="priority-item" (click)="selectCategory('Shopping')">
              <div class="flex items-center gap-2">
                <i class="fa-solid fa-cart-shopping text-orange-500"></i>
                Shopping
              </div>

              @if (category() === 'Shopping') {
                <i class="fa-solid fa-check text-orange-500"></i>
              }
            </button>

            <button class="priority-item" (click)="selectCategory('Health')">
              <div class="flex items-center gap-2">
                <i class="fa-solid fa-heart-pulse text-red-500"></i>
                Health
              </div>

              @if (category() === 'Health') {
                <i class="fa-solid fa-check text-red-500"></i>
              }
            </button>
          </div>
        }
    </div>
  </div>
</div>
