<div class="p-6 border-b border-slate-100 bg-gradient-to-r from-slate-50 to-white">
  <div class="flex gap-3 items-stretch">
    <input
      type="text"
      class="add-input flex-1 border-2 border-slate-200 rounded-lg px-4 py-3 text-sm font-normal transition-all placeholder:text-slate-400"
      placeholder="What needs to be done?"
      [(ngModel)]="taskTitle"
    />
    <button
      type="button"
      class="btn-add text-white rounded-lg px-6 py-3 font-semibold text-sm flex items-center gap-2 whitespace-nowrap"
      (click)="addTask()"
    >
      <i class="fa-solid fa-plus"></i>
      Add Task
    </button>
  </div>
</div>
