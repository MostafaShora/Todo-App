<div class="p-6 bg-white dark:bg-slate-900 border-b border-slate-100 dark:border-slate-700">
  <div class="flex flex-col md:flex-row items-center gap-4">
    <input
      type="text"
      [(ngModel)]="taskTitle"
      [placeholder]="'todo.taskPlaceholder' | transloco"
      class="w-full h-12 px-4 rounded-xl border-2 border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 text-slate-800 dark:text-slate-100 placeholder:text-slate-400 focus:outline-none focus:border-sky-500 focus:ring-4 focus:ring-sky-500/10 transition-all duration-200"
    />

    <button
      class="w-full md:w-[180px] h-14 rounded-2xl bg-gradient-to-r from-sky-500 to-sky-600 text-white font-semibold flex items-center justify-center gap-2 transition-all duration-300 hover:-translate-y-0.5 hover:shadow-xl hover:shadow-sky-500/30 active:scale-95"
      (click)="addTask()"
    >
      <i class="fa-solid fa-plus"></i>
      {{ 'form.dueDate' | transloco }}
    </button>
  </div>

  <!-- Priority + Due Date -->
  <div class="grid grid-cols-1 md:grid-cols-3 gap-5 mt-5">
    <div class="flex flex-col gap-2 relative">
      <!-- Priority -->
      <label class="text-sm font-semibold text-slate-500 dark:text-slate-400">{{
        'form.priority' | transloco
      }}</label>

      <div class="relative">
        <button
          type="button"
          (click)="togglePriority(); $event.stopPropagation()"
          class="w-full h-12 px-4 rounded-xl border-2 border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 text-slate-700 dark:text-slate-200 flex items-center justify-between transition-all duration-200 hover:border-sky-500 hover:shadow-lg hover:shadow-sky-500/10"
        >
          <div class="flex items-center gap-2">
            @switch (priority()) {
              @case ('Low') {
                <i class="fa-solid fa-circle text-green-500 text-xs"></i>
              }

              @case ('Medium') {
                <i class="fa-solid fa-circle text-yellow-400 text-xs"></i>
              }

              @case ('High') {
                <i class="fa-solid fa-circle text-red-500 text-xs"></i>
              }
            }

            {{ 'todo.' + priority().toLowerCase() | transloco }}
          </div>

          <i
            class="fa-solid fa-chevron-down text-xs transition-transform duration-200"
            [class.rotate-180]="isPriorityOpen()"
          ></i>
        </button>

        @if (isPriorityOpen()) {
          <div
            class="absolute top-full left-0 mt-2 w-full rounded-2xl overflow-hidden bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 shadow-2xl z-50 animate-dropdown"
          >
            <button
              (click)="selectPriority('Low')"
              class="w-full h-12 px-4 flex items-center justify-between transition-all duration-200 hover:bg-slate-50 dark:hover:bg-slate-800 hover:pl-6"
            >
              <div class="flex items-center gap-2">
                <i class="fa-solid fa-circle text-green-500 text-xs"></i>
                {{ 'todo.low' | transloco }}
              </div>

              @if (priority() === 'Low') {
                <i class="fa-solid fa-check text-green-500"></i>
              }
            </button>

            <button
              (click)="selectPriority('Medium')"
              class="w-full h-12 px-4 flex items-center justify-between transition-all duration-200 hover:bg-slate-50 dark:hover:bg-slate-800 hover:pl-6"
            >
              <div class="flex items-center gap-2">
                <i class="fa-solid fa-circle text-yellow-400 text-xs"></i>
                {{ 'todo.medium' | transloco }}
              </div>

              @if (priority() === 'Medium') {
                <i class="fa-solid fa-check text-yellow-500"></i>
              }
            </button>

            <button
              (click)="selectPriority('High')"
              class="w-full h-12 px-4 flex items-center justify-between transition-all duration-200 hover:bg-slate-50 dark:hover:bg-slate-800 hover:pl-6"
            >
              <div class="flex items-center gap-2">
                <i class="fa-solid fa-circle text-red-500 text-xs"></i>
                {{ 'todo.high' | transloco }}
              </div>

              @if (priority() === 'High') {
                <i class="fa-solid fa-check text-red-500"></i>
              }
            </button>
          </div>
        }
      </div>
    </div>

    <!-- Due Date -->

    <div class="flex flex-col gap-2 relative">
      <label class="text-sm font-semibold text-slate-500 dark:text-slate-400">{{
        'form.dueDate' | transloco
      }}</label>

      <input
        type="date"
        [ngModel]="dueDate()"
        (ngModelChange)="dueDate.set($event)"
        class="w-full h-12 px-4 rounded-xl border-2 border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 text-slate-800 dark:text-slate-100 focus:outline-none focus:border-sky-500 focus:ring-4 focus:ring-sky-500/10 transition-all duration-200"
      />
    </div>

    <!-- Category -->
    <div class="flex flex-col gap-2 relative">
      <label class="text-sm font-semibold text-slate-500 dark:text-slate-400">{{
        'form.category' | transloco
      }}</label>

      <button
        type="button"
        class="w-full h-12 px-4 rounded-xl border-2 border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 text-slate-700 dark:text-slate-200 flex items-center justify-between transition-all duration-200 hover:border-sky-500 hover:shadow-lg hover:shadow-sky-500/10"
        (click)="toggleCategory(); $event.stopPropagation()"
      >
        <div class="flex items-center gap-2">
          @switch (category()) {
            @case ('Work') {
              <i class="fa-solid fa-briefcase text-sky-500"></i>
            }

            @case ('Personal') {
              <i class="fa-solid fa-user text-pink-500"></i>
            }

            @case ('Study') {
              <i class="fa-solid fa-book text-indigo-500"></i>
            }

            @case ('Shopping') {
              <i class="fa-solid fa-cart-shopping text-orange-500"></i>
            }

            @case ('Health') {
              <i class="fa-solid fa-heart-pulse text-red-500"></i>
            }
          }

          <span>{{ 'todo.' + category().toLowerCase() | transloco }}</span>
        </div>

        <i
          class="fa-solid fa-chevron-down transition-transform duration-200"
          [class.rotate-180]="isCategoryOpen()"
        ></i>
      </button>

      @if (isCategoryOpen()) {
        <div
          class="absolute top-full left-0 mt-2 w-full rounded-2xl overflow-hidden bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 shadow-2xl z-50 animate-dropdown"
        >
          <button
            class="w-full h-12 px-4 flex items-center justify-between transition-all duration-200 hover:bg-slate-50 dark:hover:bg-slate-800 hover:pl-6"
            (click)="selectCategory('Work')"
          >
            <div class="flex items-center gap-2">
              <i class="fa-solid fa-briefcase text-sky-500"></i>
              {{ 'todo.work' | transloco }}
            </div>

            @if (category() === 'Work') {
              <i class="fa-solid fa-check text-sky-500"></i>
            }
          </button>

          <button
            class="w-full h-12 px-4 flex items-center justify-between transition-all duration-200 hover:bg-slate-50 dark:hover:bg-slate-800 hover:pl-6"
            (click)="selectCategory('Personal')"
          >
            <div class="flex items-center gap-2">
              <i class="fa-solid fa-user text-pink-500"></i>
              {{ 'todo.personal' | transloco }}
            </div>

            @if (category() === 'Personal') {
              <i class="fa-solid fa-check text-pink-500"></i>
            }
          </button>

          <button
            class="w-full h-12 px-4 flex items-center justify-between transition-all duration-200 hover:bg-slate-50 dark:hover:bg-slate-800 hover:pl-6"
            (click)="selectCategory('Study')"
          >
            <div class="flex items-center gap-2">
              <i class="fa-solid fa-book text-indigo-500"></i>
              {{ 'todo.study' | transloco }}
            </div>

            @if (category() === 'Study') {
              <i class="fa-solid fa-check text-indigo-500"></i>
            }
          </button>

          <button
            class="w-full h-12 px-4 flex items-center justify-between transition-all duration-200 hover:bg-slate-50 dark:hover:bg-slate-800 hover:pl-6"
            (click)="selectCategory('Shopping')"
          >
            <div class="flex items-center gap-2">
              <i class="fa-solid fa-cart-shopping text-orange-500"></i>
              {{ 'todo.shopping' | transloco }}
            </div>

            @if (category() === 'Shopping') {
              <i class="fa-solid fa-check text-orange-500"></i>
            }
          </button>

          <button
            class="w-full h-12 px-4 flex items-center justify-between transition-all duration-200 hover:bg-slate-50 dark:hover:bg-slate-800 hover:pl-6"
            (click)="selectCategory('Health')"
          >
            <div class="flex items-center gap-2">
              <i class="fa-solid fa-heart-pulse text-red-500"></i>
              {{ 'todo.health' | transloco }}
            </div>

            @if (category() === 'Health') {
              <i class="fa-solid fa-check text-red-500"></i>
            }
          </button>
        </div>
      }
    </div>
  </div>
</div>
