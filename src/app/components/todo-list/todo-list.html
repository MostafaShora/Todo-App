<div
  class="py-2 cursor-grab;"
  cdkDropList
  [cdkDropListDisabled]="currentSort() !== 'Manual'"
  (cdkDropListDropped)="onDrop($event)"
>
  @if (todos().length === 0) {
    <div class="py-20 flex flex-col items-center text-center">
      <i class="fa-regular fa-clipboard text-6xl text-slate-300 mb-5"></i>

      <h3 class="text-2xl font-bold text-slate-700">No tasks found</h3>

      <p class="text-slate-500 mt-2 max-w-sm">
        Try creating a new task or change your search or filters.
      </p>
    </div>
  } @else {
    @for (todo of todos(); track todo.id) {
      <div cdkDrag>
        <app-todo-item
          [todo]="todo"
          (edit)="onEdit($event)"
          (delete)="onDelete($event)"
          (toggle)="toggleTodo($event)"
        >
        </app-todo-item>
      </div>
    }
  }
</div>
