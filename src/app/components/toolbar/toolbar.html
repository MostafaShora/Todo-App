<div class="flex flex-wrap gap-3 items-center p-4 border-b border-slate-100 bg-slate-50">
  <div class="relative flex-1 min-w-[200px]">
    <i
      class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm pointer-events-none"
    ></i>
    <input
      type="text"
      class="search-input w-full pl-10 pr-10 py-2 border-2 border-slate-200 rounded-lg text-sm bg-white transition-all placeholder:text-slate-400"
      placeholder="Search tasks..."
      [value]="searchTerm()"
      (input)="onSearch($event)"
    />

    @if (searchTerm()) {
      <button
        type="button"
        (click)="clearSearch()"
        class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-red-500 transition"
        aria-label="Clear search"
      >
        <i class="fa-solid fa-xmark"></i>
      </button>
    }
  </div>

  <div class="relative">
    <button
      type="button"
      (click)="toggleSort(); $event.stopPropagation()"
      class="border-2 border-slate-200 bg-white text-slate-600 rounded-lg px-4 py-2 text-sm font-medium flex items-center gap-2 hover:border-sky-500 hover:text-sky-500 transition-all"
    >
      <i class="fa-solid fa-arrow-down-wide-short"></i>

      {{ currentSortLabel() }}

      <i class="fa-solid fa-chevron-down text-xs" [class.rotate-180]="isSortOpen()"></i>
    </button>

    @if (isSortOpen()) {
      <div
        class="absolute left-0 w-full sm:left-auto sm:right-0 sm:w-56 top-full mt-2 bg-white rounded-lg shadow-lg border border-slate-200 py-2 z-50 animate-dropdown"
      >
        <!-- Manual -->
        <button
          type="button"
          (click)="setSort('Manual')"
          class="w-full flex items-center justify-between px-3 py-2 text-sm hover:bg-sky-50 transition"
        >
          <span class="flex items-center gap-2">
            <i class="fa-solid fa-grip-vertical w-4"></i>
            Manual
          </span>

          @if (currentSort() === 'Manual') {
            <i class="fa-solid fa-check text-sky-500"></i>
          }
        </button>

        <!-- Newest -->
        <button
          type="button"
          (click)="setSort('Newest')"
          class="w-full flex items-center justify-between px-3 py-2 text-sm hover:bg-sky-50 transition"
        >
          <span class="flex items-center gap-2">
            <i class="fa-solid fa-calendar w-4"></i>
            Date Added (Newest)
          </span>

          @if (currentSort() === 'Newest') {
            <i class="fa-solid fa-check text-sky-500"></i>
          }
        </button>

        <!-- Oldest -->
        <button
          type="button"
          (click)="setSort('Oldest')"
          class="w-full flex items-center justify-between px-3 py-2 text-sm hover:bg-sky-50 transition"
        >
          <span class="flex items-center gap-2">
            <i class="fa-solid fa-calendar-days w-4"></i>
            Date Added (Oldest)
          </span>

          @if (currentSort() === 'Oldest') {
            <i class="fa-solid fa-check text-sky-500"></i>
          }
        </button>

        <div class="border-t border-slate-100 my-1"></div>

        <!-- Name Asc -->
        <button
          type="button"
          (click)="setSort('NameAsc')"
          class="w-full flex items-center justify-between px-3 py-2 text-sm hover:bg-sky-50 transition"
        >
          <span class="flex items-center gap-2">
            <i class="fa-solid fa-font w-4"></i>
            Name (A-Z)
          </span>

          @if (currentSort() === 'NameAsc') {
            <i class="fa-solid fa-check text-sky-500"></i>
          }
        </button>

        <!-- Name Desc -->
        <button
          type="button"
          (click)="setSort('NameDesc')"
          class="w-full flex items-center justify-between px-3 py-2 text-sm hover:bg-sky-50 transition"
        >
          <span class="flex items-center gap-2">
            <i class="fa-solid fa-font w-4"></i>
            Name (Z-A)
          </span>

          @if (currentSort() === 'NameDesc') {
            <i class="fa-solid fa-check text-sky-500"></i>
          }
        </button>

        <!-- Highest Priority -->
        <button
          type="button"
          (click)="setSort('PriorityHigh')"
          class="w-full flex items-center justify-between px-3 py-2 text-sm hover:bg-sky-50 transition"
        >
          <span class="flex items-center gap-2">
            <i class="fa-solid fa-arrow-up-wide-short w-4"></i>
            Highest Priority
          </span>

          @if (currentSort() === 'PriorityHigh') {
            <i class="fa-solid fa-check text-sky-500"></i>
          }
        </button>

        <!-- Lowest Priority -->
        <button
          type="button"
          (click)="setSort('PriorityLow')"
          class="w-full flex items-center justify-between px-3 py-2 text-sm hover:bg-sky-50 transition"
        >
          <span class="flex items-center gap-2">
            <i class="fa-solid fa-arrow-down-wide-short w-4"></i>
            Lowest Priority
          </span>

          @if (currentSort() === 'PriorityLow') {
            <i class="fa-solid fa-check text-sky-500"></i>
          }
        </button>
      </div>
    }
  </div>

  <div class="relative">
    <button
      type="button"
      (click)="toggleFilter(); $event.stopPropagation()"
      class="border-2 border-slate-200 bg-white text-slate-600 rounded-lg px-4 py-2 text-sm font-medium flex items-center gap-2 hover:border-sky-500 hover:text-sky-500 transition"
    >
      <i class="fa-solid fa-filter"></i>

      {{ currentFilterLabel() }}

      <i class="fa-solid fa-chevron-down text-xs" [class.rotate-180]="isFilterOpen()"></i>
    </button>

    @if (isFilterOpen()) {
      <div
        class="absolute left-0 w-full sm:left-auto sm:right-0 sm:w-56 mt-2 bg-white rounded-xl shadow-xl border border-slate-200 overflow-hidden z-50 animate-dropdown"
      >
        <!-- All -->

        <button class="dropdown-item" (click)="setFilter('All')">
          <span>
            <i class="fa-solid fa-layer-group"></i>
            All
          </span>

          @if (currentFilter() === 'All') {
            <i class="fa-solid fa-check text-sky-500"></i>
          }
        </button>

        <!-- Pending -->

        <button class="dropdown-item" (click)="setFilter('Pending')">
          <span>
            <i class="fa-solid fa-clock"></i>
            Pending
          </span>

          @if (currentFilter() === 'Pending') {
            <i class="fa-solid fa-check text-sky-500"></i>
          }
        </button>

        <!-- Completed -->

        <button class="dropdown-item" (click)="setFilter('Completed')">
          <span>
            <i class="fa-solid fa-check"></i>
            Completed
          </span>

          @if (currentFilter() === 'Completed') {
            <i class="fa-solid fa-check text-sky-500"></i>
          }
        </button>

        <div class="border-t border-slate-100"></div>

        <!-- High -->

        <button class="dropdown-item" (click)="setFilter('High')">
          <span>
            <i class="fa-solid fa-circle text-red-500 text-[10px]"></i>
            High
          </span>

          @if (currentFilter() === 'High') {
            <i class="fa-solid fa-check text-red-500"></i>
          }
        </button>

        <!-- Medium -->

        <button class="dropdown-item" (click)="setFilter('Medium')">
          <span>
            <i class="fa-solid fa-circle text-yellow-400 text-[10px]"></i>
            Medium
          </span>

          @if (currentFilter() === 'Medium') {
            <i class="fa-solid fa-check text-yellow-500"></i>
          }
        </button>

        <!-- Low -->

        <button class="dropdown-item" (click)="setFilter('Low')">
          <span>
            <i class="fa-solid fa-circle text-green-500 text-[10px]"></i>
            Low
          </span>

          @if (currentFilter() === 'Low') {
            <i class="fa-solid fa-check text-green-500"></i>
          }
        </button>
      </div>
    }
  </div>
</div>
