<div class="max-w-3xl mx-auto px-4 py-8">
  <app-header />

  <app-stats />

  <div
    class="bg-white rounded-xl shadow-lg border border-slate-100 overflow-hidden animate-fade-in-up"
  >
    <app-add-task />

    <app-toolbar />

    <app-todo-list (edit)="openEdit($event)" (delete)="openDelete($event)"> </app-todo-list>
  </div>

  @if (isEditModalOpen()) {
    <app-edit-todo-modal [todo]="selectedTodo()!" (save)="saveTodo($event)" (close)="closeEdit()">
    </app-edit-todo-modal>
  }

  @if (isDeleteModalOpen() && deleteTodo()) {
    <app-confirm-modal
      title="Delete Task"
      [message]="'Are you sure you want to delete ' + deleteTodo()!.title + '?'"
      (cancel)="closeDelete()"
      (confirm)="confirmDelete()"
    >
    </app-confirm-modal>
  }
</div>
