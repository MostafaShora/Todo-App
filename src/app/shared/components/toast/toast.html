<div
  class="fixed top-5 right-5 z-[9999] flex w-[380px] flex-col gap-3.5 pointer-events-none max-sm:left-4 max-sm:right-4 max-sm:top-4 max-sm:w-auto"
>
  @for (toast of toastService.toasts(); track toast.id) {
    <div
      class="relative overflow-hidden pointer-events-auto rounded-2xl border border-slate-200/80 dark:border-slate-700 bg-white/90 dark:bg-slate-900/90 backdrop-blur-xl shadow-[0_12px_24px_rgba(15,23,42,.08),0_24px_50px_rgba(15,23,42,.12)] p-4 transition-all duration-300 hover:-translate-y-1 hover:shadow-[0_18px_35px_rgba(15,23,42,.10),0_28px_60px_rgba(15,23,42,.16)] animate-slideIn"
      [class.closing]="toast.closing"
    >
      <div class="flex justify-between items-start w-full">
        <div class="flex gap-3">
          <div
            class="w-11 h-11 shrink-0 rounded-full flex items-center justify-center text-lg animate-pop"
            [ngClass]="{
              'bg-green-100 text-green-600 dark:bg-green-900/30 dark:text-green-400':
                toast.type === 'success',
              'bg-red-100 text-red-600 dark:bg-red-900/30 dark:text-red-400':
                toast.type === 'error',
              'bg-amber-100 text-amber-600 dark:bg-amber-900/30 dark:text-amber-400':
                toast.type === 'warning',
              'bg-blue-100 text-blue-600 dark:bg-blue-900/30 dark:text-blue-400':
                toast.type === 'info',
            }"
          >
            @switch (toast.type) {
              @case ('success') {
                <i class="fa-solid fa-circle-check"></i>
              }

              @case ('error') {
                <i class="fa-solid fa-circle-xmark"></i>
              }

              @case ('warning') {
                <i class="fa-solid fa-triangle-exclamation"></i>
              }

              @default {
                <i class="fa-solid fa-circle-info"></i>
              }
            }
          </div>

          <div>
            <h4 class="font-bold text-slate-900 dark:text-white">
              {{ toast.title }}
            </h4>

            <p class="mt-1 text-sm text-slate-500 dark:text-slate-400">
              {{ toast.message }}
            </p>
          </div>
        </div>

        <button
          class="w-8 h-8 rounded-lg flex items-center justify-center text-slate-500 transition-all duration-200 hover:bg-slate-100 dark:hover:bg-slate-800 hover:text-slate-900 dark:hover:text-white hover:rotate-90"
          (click)="toastService.close(toast.id)"
        >
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>

      <div
        class="absolute left-0 bottom-0 h-1 w-full animate-progress"
        [ngClass]="{
          'bg-green-500': toast.type === 'success',
          'bg-red-500': toast.type === 'error',
          'bg-amber-500': toast.type === 'warning',
          'bg-blue-500': toast.type === 'info',
        }"
      ></div>
    </div>
  }
</div>
