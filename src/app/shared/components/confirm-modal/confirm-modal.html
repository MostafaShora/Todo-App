<div class="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center z-50">
  <div
    class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-2xl shadow-2xl w-[420px] p-6 animate-scale"
  >
    <div class="flex items-center gap-3 mb-5">
      <div
        class="w-12 h-12 rounded-full bg-red-100 dark:bg-red-500/15 flex items-center justify-center"
      >
        <i class="fa-solid fa-trash text-red-600 dark:text-red-400"></i>
      </div>

      <div>
        <h2 class="text-lg font-bold text-slate-800 dark:text-slate-100">
          {{ title() }}
        </h2>

        <p class="text-sm text-slate-500 dark:text-slate-400">
          {{ message() }}
        </p>
      </div>
    </div>

    <div class="flex justify-end gap-3">
      <button
        class="px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-600 text-slate-700 dark:text-slate-200 hover:bg-slate-100 dark:hover:bg-slate-800 transition"
        (click)="cancel.emit()"
      >
        Cancel
      </button>

      <button
        class="px-4 py-2 rounded-lg bg-red-600 text-white shadow-md shadow-red-500/20 hover:bg-red-700 transition"
        (click)="confirm.emit()"
      >
        Delete
      </button>
    </div>
  </div>
</div>
